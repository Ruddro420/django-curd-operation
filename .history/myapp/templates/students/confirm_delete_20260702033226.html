{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow-lg rounded-lg p-8 text-center">
    <h2 class="text-2xl font-bold text-red-600 mb-4">⚠️ Confirm Delete</h2>
    <p class="text-gray-700 mb-6">
        Are you sure you want to delete <strong>"{{ student.full_name }}"</strong>?<br>
        <span class="text-sm text-gray-500">This action cannot be undone.</span>
    </p>
    
    <form method="post" class="inline-block">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition mr-4">
            Yes, Delete
        </button>
    </form>
    <a href="{% url 'students:list' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-6 rounded-lg transition">
        Cancel
    </a>
</div>
{% endblock %}
