{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">
        {% if form.instance.pk %}Edit Student{% else %}Add New Student{% endif %}
    </h2>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label for="id_full_name" class="block text-sm font-medium text-gray-700">Full Name</label>
            <input type="text" name="full_name" id="id_full_name" 
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" 
                   value="{{ form.full_name.value|default:'' }}">
            {{ form.full_name.errors }}
        </div>

        <div>
            <label for="id_phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
            <input type="text" name="phone" id="id_phone" 
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" 
                   value="{{ form.phone.value|default:'' }}">
            {{ form.phone.errors }}
        </div>

        <div>
            <label for="id_email" class="block text-sm font-medium text-gray-700">Email (optional)</label>
            <input type="email" name="email" id="id_email" 
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" 
                   value="{{ form.email.value|default:'' }}">
            {{ form.email.errors }}
        </div>

        <div class="flex items-center space-x-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                Save Student
            </button>
            <a href="{% url 'students:list' %}" class="text-gray-600 hover:text-gray-800">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
