{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Student Profile</h2>
    
    <div class="space-y-4">
        <div>
            <span class="font-semibold text-gray-600">Name:</span>
            <span class="text-gray-800">{{ student.full_name }}</span>
        </div>
        <div>
            <span class="font-semibold text-gray-600">Phone:</span>
            <span class="text-gray-800">{{ student.phone }}</span>
        </div>
        <div>
            <span class="font-semibold text-gray-600">Email:</span>
            <span class="text-gray-800">{{ student.email|default:"Not provided" }}</span>
        </div>
        <div>
            <span class="font-semibold text-gray-600">Enrolled:</span>
            <span class="text-gray-800">{{ student.enrollment_date|date:"M d, Y H:i" }}</span>
        </div>
    </div>

    <div class="mt-8 flex space-x-4">
        <a href="{% url 'students:update' student.pk %}" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded-lg transition">
            Edit
        </a>
        <a href="{% url 'students:delete' student.pk %}" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg transition">
            Delete
        </a>
        <a href="{% url 'students:list' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-6 rounded-lg transition">
            Back to List
        </a>
    </div>
</div>
{% endblock %}
