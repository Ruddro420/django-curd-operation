{% extends 'base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold text-gray-700">All Students</h2>
    <a href="{% url 'students:create' %}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
        + Add New Student
    </a>
</div>

<div class="bg-white shadow-md rounded-lg overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for student in students %}
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 whitespace-nowrap">{{ student.full_name }}</td>
                <td class="px-6 py-4 whitespace-nowrap">{{ student.phone }}</td>
                <td class="px-6 py-4 whitespace-nowrap">{{ student.email|default:"—" }}</td>
                <td class="px-6 py-4 whitespace-nowrap space-x-2">
                    <a href="{% url 'students:detail' student.pk %}" class="text-blue-600 hover:text-blue-800 font-medium">View</a>
                    <a href="{% url 'students:update' student.pk %}" class="text-yellow-600 hover:text-yellow-800 font-medium">Edit</a>
                    <a href="{% url 'students:delete' student.pk %}" class="text-red-600 hover:text-red-800 font-medium">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="px-6 py-4 text-center text-gray-500">No students found. <a href="{% url 'students:create' %}" class="text-blue-600 hover:underline">Add one</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
